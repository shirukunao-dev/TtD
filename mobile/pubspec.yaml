    sdk: flutter
  firebase_core: ^3.8.1
  firebase_database: ^11.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
